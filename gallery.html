<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PERTSERV Live Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000;
    color:white;
    overflow:hidden;
}

/* ===========================
   HEADER
=========================== */

.header{

    position:fixed;

    top:20px;

    width:100%;

    text-align:center;

    z-index:100;

}

.header h1{

    font-size:48px;

}

.header h2{

    color:#FFD700;

    margin-top:6px;

    font-size:22px;

}

/* ===========================
   MAIN
=========================== */

#gallery{

    height:100vh;

    display:flex;

    flex-direction:column;

}

/* ===========================
   FEATURED PHOTO
=========================== */

#featured{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;

    padding-top:110px;

}

#featured img{

    max-width:90%;

    max-height:72vh;

    border-radius:22px;

    box-shadow:0 0 35px rgba(255,255,255,.2);

    transition:.5s;

}

/* ===========================
   NEW PHOTO BADGE
=========================== */

#newBadge{

    position:absolute;

    top:120px;

    left:50%;

    transform:translateX(-50%);

    background:#ff3b30;

    padding:16px 32px;

    border-radius:40px;

    font-size:28px;

    font-weight:bold;

    display:none;

    animation:pulse 1s infinite;

    z-index:50;

}

@keyframes pulse{

0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.08);}
100%{transform:translateX(-50%) scale(1);}

}

/* ===========================
   RECENT UPLOADS
=========================== */

#recent{

    height:220px;

    background:#111;

    border-top:3px solid #FFD700;

    padding:15px;

    overflow-y:auto;

}

#recentTitle{

    font-size:22px;

    color:#FFD700;

    margin-bottom:15px;

}

.thumbnail{

    display:flex;

    align-items:center;

    gap:15px;

    margin-bottom:12px;

    padding:8px;

    border-radius:12px;

    cursor:pointer;

    transition:.25s;

}

.thumbnail img{

    width:120px;

    height:90px;

    object-fit:cover;

    border-radius:10px;

}

.thumbnail.active{

    background:#1b1b1b;

    outline:3px solid #FFD700;

}

.thumbLabel{

    font-size:18px;

}

</style>

</head>

<body>

<div class="header">

<h1>PERTSERV</h1>

<h2>15th Anniversary Live Gallery 📸</h2>

</div>

<div id="gallery">

<div id="featured">

<div id="newBadge">

🎉 NEW PHOTO!

</div>

<img id="featuredPhoto">

</div>

<div id="recent">

<div id="recentTitle">

Recent Uploads

</div>

<div id="thumbnailList">

</div>

</div>

</div>

<script>

// PART 2 WILL GO HERE

</script>

</body>

</html>
