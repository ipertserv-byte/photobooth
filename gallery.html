<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PERTSERV 15th Anniversary Live Gallery</title>

<style>

    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:
radial-gradient(circle at top,#3B82F6 0%,#1E3A8A 35%,#0B1738 70%,#050B1A 100%);

color:white;

min-height:100vh;

overflow:hidden;

}

.page{

display:flex;

flex-direction:column;

height:100vh;

padding:25px;

}

.header{

text-align:center;

margin-bottom:20px;

}

.header h1{

font-size:56px;

font-weight:800;

}

.header p{

font-size:24px;

margin-top:8px;

}

.counter{

margin-top:12px;

font-size:22px;

font-weight:bold;

color:#FFD54F;

}

main{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.featured-container{
    width:min(900px,90vw);
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,.05);
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,140,255,.35);
}

#featuredPhoto{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
    border-radius:18px;
    transition:all .6s ease;
}

#badge{
position:absolute;
top:18px;
left:18px;
background:#ff9800;
padding:10px 18px;
border-radius:30px;
font-weight:bold;
display:none;
}

.filmstrip-wrapper{
margin-top:35px;
display:flex;
align-items:center;
gap:18px;
width:100%;
}

#filmstrip{
display:flex;
gap:15px;
overflow:hidden;
flex:1;
justify-content:center;
}

.thumb{
width:110px;
height:150px;
object-fit:cover;
border-radius:14px;
border:3px solid transparent;
transition:.4s;
}

.thumb.active{
border-color:#ff9800;
transform:scale(1.08);
box-shadow:0 0 20px orange;
}

.nav-btn{
background:rgba(255,255,255,.1);
border:none;
color:white;
width:58px;
height:58px;
border-radius:50%;
font-size:30px;
cursor:pointer;
}

footer{
text-align:center;
padding:18px;
font-size:18px;
color:#ddd;
}
    
</style>
    
</head>

<body>
<div class="page">

    <header class="header">

        <h1>PERTSERV</h1>

        <p>15th Anniversary Live Photobooth 🎉</p>

        <div class="counter">

            📸 <span id="photoCount">0</span> Memories Captured

        </div>

    </header>

    <main>

        <div class="featured-container">

            <img id="featuredPhoto">

            <div id="badge">

                ✨ Just Captured

            </div>

        </div>

        <div class="filmstrip-wrapper">

            <button class="nav-btn" id="prevBtn">❮</button>

            <div id="filmstrip"></div>

            <button class="nav-btn" id="nextBtn">❯</button>

        </div>

    </main>

    <footer>

        Live Feed • Updates Automatically

    </footer>

</div>
<script>
const API = "https://photobooth-api.ipertserv.workers.dev";

let photos = [];
let currentIndex = 0;
let slideTimer = null;

const featured = document.getElementById("featuredPhoto");
const filmstrip = document.getElementById("filmstrip");
const counter = document.getElementById("photoCount");
const badge = document.getElementById("badge");

async function loadPhotos() {
    try {
        const res = await fetch(API);
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) return;

        counter.textContent = data.length;

        // First load
        if (photos.length === 0) {
            photos = data;
            currentIndex = 0;
            showFeatured(false);
            renderFilmstrip();
            startSlideshow();
            return;
        }

        // New upload detected
        if (data.length > photos.length) {
            photos = data;

            // Newest photo is always first
            currentIndex = 0;

            showFeatured(true);
            renderFilmstrip();

            // Restart slideshow after showing new photo
            startSlideshow();

            return;
        }

        photos = data;

    } catch (err) {
        console.error(err);
    }
}

function showFeatured(isNew = false) {

    if (!photos.length) return;

    featured.style.opacity = 0;

    featured.onload = () => {

        featured.style.opacity = 1;

        if (isNew) {

            badge.style.display = "block";

            setTimeout(() => {
                badge.style.display = "none";
            }, 5000);

        }

    };

    featured.src = photos[currentIndex].url;

}

function renderFilmstrip() {

    filmstrip.innerHTML = "";

    const visible = 6;

    let start = Math.max(0, currentIndex - 2);

    let end = Math.min(start + visible, photos.length);

    for (let i = start; i < end; i++) {

        const img = document.createElement("img");

        img.src = photos[i].url;

        img.className = "thumb";

        if (i === currentIndex) {
            img.classList.add("active");
        }

        img.onclick = () => {
            currentIndex = i;
            showFeatured();
            renderFilmstrip();
            startSlideshow();
        };

        filmstrip.appendChild(img);

    }

}

function nextPhoto() {

    if (!photos.length) return;

    currentIndex++;

    if (currentIndex >= photos.length) {
        currentIndex = 0;
    }

    showFeatured();
    renderFilmstrip();

}

function startSlideshow() {

    clearInterval(slideTimer);

    slideTimer = setInterval(nextPhoto, 5000);

}

document.getElementById("nextBtn").onclick = () => {
    nextPhoto();
    startSlideshow();
};

document.getElementById("prevBtn").onclick = () => {

    currentIndex--;

    if (currentIndex < 0) {
        currentIndex = photos.length - 1;
    }

    showFeatured();
    renderFilmstrip();
    startSlideshow();

};

loadPhotos();

setInterval(loadPhotos, 1000);

</script>

</body>
</html>
