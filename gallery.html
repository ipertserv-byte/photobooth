<script>
const API = "https://photobooth-api.ipertserv.workers.dev";

let photos = [];
let currentIndex = 0;

const featured = document.getElementById("featuredPhoto");
const filmstrip = document.getElementById("filmstrip");
const counter = document.getElementById("photoCount");
const badge = document.getElementById("badge");

async function loadPhotos() {

    try {

        const res = await fetch(API);
        const data = await res.json();

        if (!Array.isArray(data) || !data.length) return;

        // Detect new uploads
        if (!photos.length) {

            photos = data;

            currentIndex = photos.length - 1; // Start with the newest photo

            showFeatured(false);

        } else if (data.length > photos.length) {

            photos = data;

            currentIndex = photos.length - 1;

            showFeatured(true);

        } else {

            photos = data;

        }

        counter.textContent = photos.length;

        renderFilmstrip();

    }

    catch(err){

        console.log(err);

    }

}


function showFeatured(isNew = false){

    if(!photos.length) return;

    featured.style.opacity = 0;

    setTimeout(()=>{

        featured.src = photos[currentIndex].url;

        featured.style.opacity = 1;

    },300);

    if(isNew){

        badge.style.display = "block";

        setTimeout(()=>{

            badge.style.display = "none";

        },5000);

    }

}

function renderFilmstrip() {

    filmstrip.innerHTML = "";

    if (!photos.length) return;

    const visible = 6;

    let start = currentIndex - 2;

    if (start < 0) {
        start = 0;
    }

    if (start > photos.length - visible) {
        start = Math.max(0, photos.length - visible);
    }

    const end = Math.min(start + visible, photos.length);

    for (let i = start; i < end; i++) {

        const img = document.createElement("img");

        img.src = photos[i].url;

        img.className = "thumb";

        if (i === currentIndex) {
            img.classList.add("active");
        }

        img.onclick = () => {

            currentIndex = i;

            showFeatured();

            renderFilmstrip();

        };

        filmstrip.appendChild(img);

    }

}

function nextPhoto(){

    if(!photos.length) return;

    currentIndex++;

    if(currentIndex>=photos.length){

        currentIndex=0;

    }

    showFeatured();

    renderFilmstrip();

}

document.getElementById("nextBtn").onclick=nextPhoto;

document.getElementById("prevBtn").onclick=()=>{

    currentIndex--;

    if(currentIndex<0){

        currentIndex=photos.length-1;

    }

    showFeatured();

    renderFilmstrip();

};

loadPhotos();

setInterval(loadPhotos,5000);

setInterval(nextPhoto,5000);

</script>
