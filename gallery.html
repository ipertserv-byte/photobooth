<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PERTSERV Live Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eef3f9;
    color:#083b7c;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}

/* HEADER */
.header{
    position:absolute;
    top:20px;
    left:0;
    width:100%;
    text-align:center;
    z-index:10;
}

.header h1{
    font-size:48px;
    color:#083b7c;
}

.header h2{
    font-size:22px;
    color:#1d72ff;
}

    /* =========================
   GALLERY LAYOUT
========================= */

#gallery{
    display:flex;
    width:100vw;
    height:100vh;
}

#slideshow{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:80px;
}

#sidebar{
    width:280px;
    background:#ffffff;
    border-left:4px solid #1d72ff;
    box-shadow:-4px 0 12px rgba(0,0,0,.08);
    overflow-y:auto;
    padding:15px;
}

#sidebar h3{
    text-align:center;
    color:#083b7c;
    margin-bottom:15px;
}

    .thumb.active{
    border:4px solid #FFD700;
    transform:scale(1.03);
}

#photo{
    max-width:92%;
    max-height:88vh;
    border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.20);
    transition:opacity .5s ease;
}

    .thumb{
    margin-bottom:15px;
    padding:8px;
    border-radius:12px;
    border:3px solid transparent;
    cursor:pointer;
    transition:.25s;
    background:#f8f8f8;
}

.thumb img{
    width:100%;
    border-radius:10px;
    display:block;
}

.thumb.active{
    border-color:#FFD700;
    background:#eaf3ff;
}

.thumb:hover{
    transform:scale(1.02);
}

#loading{
    font-size:24px;
    color:#fff;
}
</style>
</head>

<body>

<div class="header">
    <h1>PERTSERV</h1>
    <h2>15th Anniversary Live Photobooth 📸</h2>
</div>

<div id="gallery">

    <div id="slideshow">
        <div id="loading">Loading photos...</div>
    </div>

    <div id="sidebar">

        <h3>📸 Recent Uploads</h3>

        <div id="thumbList"></div>

    </div>

</div>

<script>

const API = "https://photobooth-api.ipertserv.workers.dev";

let photos = [];
let index = 0;

    let previousCount = 0;
let isPaused = false;
let resumeTimer = null;

/* =========================
   LOAD PHOTOS FROM WORKER
========================= */
async function loadPhotos() {

    try {
        const res = await fetch(API);
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) return;

        // FIRST LOAD
        if (photos.length === 0) {

            photos = data;
            previousCount = data.length;

            showPhoto();
            return;
        }

        // NEW PHOTO DETECTED
        if (data.length > previousCount) {

            photos = data;

            previousCount = data.length;

            // show newest photo immediately
            index = 0;

            showPhoto();

            showNewPhotoBanner();

            pauseSlideshowTemporarily();

            return;
        }

        photos = data;

    } catch (err) {
        console.error("Failed to load photos:", err);
    }
}

    function showNewPhotoBanner() {

    let old = document.getElementById("newBanner");

    if (old) old.remove();

    const banner = document.createElement("div");

    banner.id = "newBanner";

    banner.innerText = "🎉 NEW PHOTO!";

    banner.style.position = "absolute";
    banner.style.top = "100px";
    banner.style.left = "50%";
    banner.style.transform = "translateX(-50%)";
    banner.style.background = "#1d72ff";
    banner.style.color = "white";
    banner.style.padding = "15px 30px";
    banner.style.borderRadius = "40px";
    banner.style.fontSize = "28px";
    banner.style.fontWeight = "bold";
    banner.style.zIndex = "999";

    document.body.appendChild(banner);

    setTimeout(() => {

        banner.remove();

    }, 3000);
}

    function pauseSlideshowTemporarily() {

    isPaused = true;

    clearTimeout(resumeTimer);

    resumeTimer = setTimeout(() => {

        isPaused = false;

    }, 6000);
}

/* =========================
   SHOW CURRENT PHOTO
========================= */
function showPhoto() {

    const slideshow = document.getElementById("slideshow");

    if (!photos.length) return;

    slideshow.innerHTML = "";

    const img = document.createElement("img");
    img.id = "photo";
    img.src = photos[index].url;

    slideshow.appendChild(img);

    buildSidebar();

}

    function buildSidebar(){

    const list = document.getElementById("thumbList");

    list.innerHTML = "";

    photos.forEach((photo, i) => {

        const item = document.createElement("div");

        item.className = "thumb";

        if (i === index) {
            item.classList.add("active");
        }

        item.innerHTML = `
            <img src="${photo.url}">
        `;

        item.onclick = () => {

            index = i;

            showPhoto();

            updateActiveThumb();

        };

        list.appendChild(item);

    });

    updateActiveThumb();
}

    function updateActiveThumb(){

    document.querySelectorAll(".thumb").forEach((t, i) => {

        if (i === index) {
            t.classList.add("active");

            t.scrollIntoView({
                behavior: "smooth",
                block: "center"
            });

        } else {
            t.classList.remove("active");
        }

    });

}

/* =========================
   NEXT PHOTO (SLIDESHOW)
========================= */
function nextPhoto() {

    if (!photos.length || isPaused) return;

    index = (index + 1) % photos.length;

    showPhoto();

    updateActiveThumb();
}
/* =========================
   INIT
========================= */
loadPhotos();

/* refresh gallery from cloud */
setInterval(loadPhotos, 5000);

/* slideshow rotation */
setInterval(nextPhoto, 4000);

</script>

</body>
</html>
