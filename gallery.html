<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PERTSERV 15th Anniversary Live Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}

.header{
    position:absolute;
    top:20px;
    left:0;
    width:100%;
    text-align:center;
    z-index:10;
}

.header h1{
    font-size:48px;
}

.header h2{
    font-size:26px;
    margin-top:8px;
    color:#FFD700;
}

#slideshow{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#photo{
    max-width:95vw;
    max-height:90vh;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255,255,255,.25);
    transition:opacity .8s;
}

#loading{
    font-size:30px;
}
</style>
</head>

<body>

<div class="header">
    <h1>PERTSERV</h1>
    <h2>15th Anniversary Live Photobooth 📸</h2>
</div>

<div id="slideshow">
    <div id="loading">Loading photos...</div>
</div>

<script>

const API="https://photobooth-api.ipertserv.workers.dev";

let photos=[];
let index=0;

async function loadPhotos(){

    try{

        const res=await fetch(API);
        const data=await res.json();

        if(Array.isArray(data) && data.length){

            photos=data;

            if(!document.getElementById("photo")){
                showPhoto();
            }

        }

    }catch(e){
        console.log(e);
    }

}

function showPhoto(){

    if(!photos.length) return;

    const slideshow=document.getElementById("slideshow");

    slideshow.innerHTML="";

    const img=document.createElement("img");

    img.id="photo";

    img.src=photos[index].url;

    slideshow.appendChild(img);

}

function nextPhoto(){

    if(!photos.length) return;

    index++;

    if(index>=photos.length){
        index=0;
    }

    showPhoto();

}

loadPhotos();

setInterval(loadPhotos,5000);

setInterval(nextPhoto,3000);

</script>

</body>
</html>
