<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PERTSERV 15th Anniversary Live Photobooth</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="header">
        <h1>🎉 PERTSERV 15th Anniversary</h1>
        <p>Live Photobooth</p>
    </div>

    <div class="camera-container">

        <video
    id="video"
    autoplay
    playsinline
    muted
    webkit-playsinline
></video>

        <canvas id="canvas" hidden></canvas>

        <img
            id="preview"
            alt="Captured Photo"
        >

    </div>

    <div class="camera-buttons">

        <button id="rearBtn" class="primary-btn">📷 Rear Camera</button>
<button id="frontBtn" class="primary-btn">🤳 Selfie Camera</button>

<button id="singleModeBtn" class="secondary-btn">Single</button>
<button id="gridModeBtn" class="secondary-btn">Grid (4 Shots)</button>

<button id="captureBtn" class="primary-btn">📸 Capture</button>

    </div>
    
    <div class="action-buttons">

        <button id="captureBtn">
            📸 Capture
        </button>

        <button id="retakeBtn">
            🔄 Retake
        </button>

        <button id="uploadBtn">
            ☁️ Upload
        </button>


        
    </div>

    <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
