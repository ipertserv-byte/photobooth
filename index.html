<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photobooth</title>
</head>

<body>

<h2>Photobooth</h2>

<!-- MODE SELECT -->
<div>
  <button onclick="setMode('single')">Single Photo</button>
  <button onclick="setMode('strip')">4 Photo Strip</button>
</div>

<!-- CAMERA SELECT -->
<div>
  <button id="rearBtn">Rear</button>
  <button id="frontBtn">Selfie</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<!-- PREVIEW GRID -->
<div id="grid" style="
  display:grid;
  gap:5px;
  margin-top:10px;
  max-width:300px;
"></div>

<div>
  <button id="captureBtn">Capture</button>
  <button id="retakeBtn">Retake</button>
  <button id="uploadBtn">Upload</button>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const grid = document.getElementById("grid");

let stream;
let mode = "single"; // single or strip
let images = [];

function setMode(m) {
  mode = m;
  images = [];
  grid.innerHTML = "";

  if (mode === "single") {
    grid.style.gridTemplateColumns = "1fr";
  } else {
    grid.style.gridTemplateColumns = "repeat(2, 1fr)";
  }
}

async function startCamera(facing) {
  if (stream) stream.getTracks().forEach(t => t.stop());

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing },
    audio: false
  });

  video.srcObject = stream;
}

rearBtn.onclick = () => startCamera("environment");
frontBtn.onclick = () => startCamera("user");

captureBtn.onclick = () => {
  if (mode === "strip" && images.length >= 4) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const img = canvas.toDataURL("image/png");

  if (mode === "single") {
    images = [img];
    grid.innerHTML = `<img src="${img}" style="width:100%">`;
  } else {
    images.push(img);

    const el = document.createElement("img");
    el.src = img;
    el.style.width = "100%";
    grid.appendChild(el);
  }
};

retakeBtn.onclick = () => {
  images = [];
  grid.innerHTML = "";
};

uploadBtn.onclick = () => {
  if (!images.length) return alert("No photos!");
  alert("Uploaded (demo)");
};

setMode("single");
startCamera("environment");
</script>

</body>
</html>
