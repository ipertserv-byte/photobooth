<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photobooth</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin: 15px 0;
    }

    video {
        width: 90%;
        max-width: 500px;
        border-radius: 10px;
        background: black;
    }

    canvas {
        display: none;
    }

    #preview {
        margin-top: 10px;
        width: 90%;
        max-width: 500px;
        border-radius: 10px;
        display: none;
    }

    .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 15px 0;
    }

    button {
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        background: #333;
        color: white;
    }

    button:hover {
        background: #555;
    }

    .camera-select {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

    .camera-select button {
        flex: 1;
        min-width: 120px;
    }

    .active {
        background: #00aaff !important;
    }

    #status {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.8;
    }

    .grid-options {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

</style>
</head>

<body>

<h1>Photobooth</h1>

<div class="camera-select">
    <button id="rearBtn" class="active">Rear Camera</button>
    <button id="frontBtn">Selfie Camera</button>
</div>

<div class="grid-options">
    <button id="singleMode" class="active">Single Photo</button>
    <button id="fourMode">4 Photo Grid</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<img id="preview" />

<div class="controls">
    <button id="captureBtn">Capture</button>
    <button id="retakeBtn">Retake</button>
    <button id="uploadBtn">Upload</button>
</div>

<div id="status">Ready</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");

const rearBtn = document.getElementById("rearBtn");
const frontBtn = document.getElementById("frontBtn");

const captureBtn = document.getElementById("captureBtn");
const retakeBtn = document.getElementById("retakeBtn");
const uploadBtn = document.getElementById("uploadBtn");

const status = document.getElementById("status");

const singleMode = document.getElementById("singleMode");
const fourMode = document.getElementById("fourMode");

let currentStream;
let currentCamera = "environment";
let mode = "single";

async function startCamera(facingMode) {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode }
    });

    video.srcObject = currentStream;
    currentCamera = facingMode;
    status.textContent = "Camera started";
}

rearBtn.onclick = () => {
    rearBtn.classList.add("active");
    frontBtn.classList.remove("active");
    startCamera("environment");
};

frontBtn.onclick = () => {
    frontBtn.classList.add("active");
    rearBtn.classList.remove("active");
    startCamera("user");
};

singleMode.onclick = () => {
    mode = "single";
    singleMode.classList.add("active");
    fourMode.classList.remove("active");
};

fourMode.onclick = () => {
    mode = "four";
    fourMode.classList.add("active");
    singleMode.classList.remove("active");
};

captureBtn.onclick = () => {
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const imageData = canvas.toDataURL("image/png");

    preview.src = imageData;
    preview.style.display = "block";

    status.textContent = mode === "single"
        ? "Single photo captured"
        : "Grid mode ready (extend logic for 4 shots)";
};

retakeBtn.onclick = () => {
    preview.style.display = "none";
    status.textContent = "Retake ready";
};

uploadBtn.onclick = () => {
    status.textContent = "Upload feature placeholder (connect Cloudflare later)";
};

startCamera("environment");
</script>

</body>
</html>
