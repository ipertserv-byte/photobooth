<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photobooth</title>
</head>

<body>

<h2>Photobooth</h2>

<div>
  <button id="rearBtn">Rear Camera</button>
  <button id="frontBtn">Selfie Camera</button>
</div>

<video id="video" autoplay playsinline></video>

<canvas id="canvas" style="display:none;"></canvas>

<img id="preview" style="max-width:100%; display:none;" />

<div>
  <button id="captureBtn">Capture</button>
  <button id="retakeBtn">Retake</button>
  <button id="uploadBtn">Upload</button>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");

const rearBtn = document.getElementById("rearBtn");
const frontBtn = document.getElementById("frontBtn");

const captureBtn = document.getElementById("captureBtn");
const retakeBtn = document.getElementById("retakeBtn");
const uploadBtn = document.getElementById("uploadBtn");

let currentStream;
let imageData = "";

async function startCamera(facingMode) {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode },
    audio: false
  });

  video.srcObject = currentStream;
}

rearBtn.onclick = () => startCamera("environment");
frontBtn.onclick = () => startCamera("user");

captureBtn.onclick = () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  imageData = canvas.toDataURL("image/png");

  preview.src = imageData;
  preview.style.display = "block";
};

retakeBtn.onclick = () => {
  preview.style.display = "none";
  imageData = "";
};

uploadBtn.onclick = () => {
  if (!imageData) return alert("No image captured!");
  alert("Uploaded (demo only)");
};

startCamera("environment");
</script>

</body>
</html>
