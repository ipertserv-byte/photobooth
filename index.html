<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Photobooth</title>

<style>
    body{
        margin:0;
        font-family: Arial, sans-serif;
        background:#f3f5f7;
        display:flex;
        justify-content:center;
    }

    .app{
        width:100%;
        max-width:420px;
        background:white;
        min-height:100vh;
        padding:20px 15px;
        box-sizing:border-box;
    }

    h1{
        text-align:center;
        margin:10px 0 0;
        font-size:26px;
        color:#1f4f9a;
    }

    .subtitle{
        text-align:center;
        font-size:14px;
        color:#666;
        margin-bottom:15px;
    }

    .preview{
        width:100%;
        border-radius:16px;
        overflow:hidden;
        background:black;
        aspect-ratio: 3/4;
        display:flex;
        align-items:center;
        justify-content:center;
        margin-bottom:15px;
    }

    video{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    canvas{ display:none; }

    button{
        width:100%;
        padding:16px;
        margin:8px 0;
        border:none;
        border-radius:12px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
    }

    .btn-rear{
        background:#0d3b78;
        color:white;
    }

    .btn-front{
        background:#124a92;
        color:white;
    }

    .btn-capture{
        background:#1e7bff;
        color:white;
    }

    .status{
        text-align:center;
        font-size:13px;
        color:#666;
        margin-top:10px;
    }
</style>
</head>

<body>

<div class="app">

    <h1>PERTSERV / 15th Anniversary</h1>
    <div class="subtitle">Live Photobooth</div>

    <div class="preview">
        <video id="video" autoplay playsinline></video>
    </div>

    <button class="btn-rear" id="rearBtn">📷 Rear Camera</button>
    <button class="btn-front" id="frontBtn">🤳 Selfie Camera</button>
    <button class="btn-capture" id="captureBtn">📸 Capture</button>

    <canvas id="canvas"></canvas>

    <div class="status" id="status">Ready</div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const status = document.getElementById("status");

const rearBtn = document.getElementById("rearBtn");
const frontBtn = document.getElementById("frontBtn");
const captureBtn = document.getElementById("captureBtn");

let stream;
let currentFacing = "environment";

async function startCamera(facingMode){
    if(stream){
        stream.getTracks().forEach(t => t.stop());
    }

    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode }
    });

    video.srcObject = stream;
    currentFacing = facingMode;
    status.textContent = "Camera: " + facingMode;
}

rearBtn.onclick = () => startCamera("environment");
frontBtn.onclick = () => startCamera("user");

captureBtn.onclick = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const img = canvas.toDataURL("image/png");

    // simple preview (replace if you want gallery upload)
    const newWindow = window.open();
    newWindow.document.write(`<img src="${img}" style="width:100%">`);
};

startCamera("environment");
</script>

</body>
</html>
