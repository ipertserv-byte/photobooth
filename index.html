<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PERTSERV 15th Anniversary Live Photobooth</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="header">
        <h1>🎉 PERTSERV 15th Anniversary</h1>
        <p>Live Photobooth</p>
    </div>


    
    <div class="camera-container">

    <!-- LEFT CONTROLS -->
    <div class="photo-mode">
        <button id="singleMode" class="mode-btn active">
            🖼️
        </button>

        <button id="gridMode" class="mode-btn">
            ⊞
        </button>
    </div>

    <!-- RIGHT CONTROLS -->
    <div class="orientation-mode">
        <button id="portraitBtn" class="orientation-btn active">
            📱
        </button>

        <button id="landscapeBtn" class="orientation-btn">
            🖥️
        </button>
    </div>

    <video
    id="video"
    autoplay
    muted
    playsinline
    webkit-playsinline
></video>

    <canvas id="canvas" hidden></canvas>

    <img
        id="preview"
        alt="Captured Photo"
    >

</div>


    

    <div class="camera-buttons">
    <button id="rearBtn">📷 Rear Camera</button>
    <button id="frontBtn">🤳 Selfie Camera</button>
</div>

<div class="action-buttons">
    <button id="captureBtn">📸 Capture</button>
    <button id="retakeBtn">🔄 Retake</button>
    <button id="uploadBtn">☁️ Upload</button>
</div>

    <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
