<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PERTSERV 15th Anniversary Photobooth</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎉 PERTSERV 15th Anniversary</h1>
    <p class="subtitle">Live Photobooth</p>

    <!-- Camera -->
    <video id="video" autoplay playsinline></video>

    <!-- Hidden canvas -->
    <canvas id="canvas" style="display:none;"></canvas>

    <!-- Preview -->
    <img id="preview" alt="Photo Preview">

    <!-- Camera Switch -->
    <div class="camera-select">
        <button id="rearBtn">📷 Rear Camera</button>
        <button id="frontBtn">🤳 Selfie Camera</button>
    </div>

    <!-- Buttons -->
    <div class="buttons">
        <button id="captureBtn">📸 Capture</button>
        <button id="retakeBtn" style="display:none;">🔄 Retake</button>
        <button id="uploadBtn" style="display:none;">☁️ Upload</button>
    </div>

    <!-- Status -->
    <p id="status"></p>

</div>

<script src="script.js"></script>

</body>
</html>
